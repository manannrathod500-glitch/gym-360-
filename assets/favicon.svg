<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="#111111"/>
  
  <!-- Flame Silhouette in Background of the Icon -->
  <path d="M256 64c0 0 80 100 80 180c0 44.2-35.8 80-80 80s-80-35.8-80-80c0-80 80-180 80-180z" fill="#7A2C10" opacity="0.4" />
  
  <!-- Active Flame Accent -->
  <path d="M256 120c0 0 50 70 50 120c0 27.6-22.4 50-50 50s-50-22.4-50-50c0-50 50-120 50-120z" fill="#FF5A1F" />
  
  <!-- Dumbbell Overlay -->
  <g transform="translate(106, 186)">
    <!-- Handle -->
    <rect x="60" y="55" width="180" height="30" rx="5" fill="#EDEAE4" stroke="#111111" stroke-width="6" />
    
    <!-- Left Weights -->
    <rect x="25" y="15" width="35" height="110" rx="10" fill="#232323" stroke="#EDEAE4" stroke-width="4" />
    <rect x="5" y="25" width="20" height="90" rx="8" fill="#2C2C2C" stroke="#EDEAE4" stroke-width="4" />
    <circle cx="15" cy="70" r="4" fill="#FF5A1F" />
    
    <!-- Right Weights -->
    <rect x="240" y="15" width="35" height="110" rx="10" fill="#232323" stroke="#EDEAE4" stroke-width="4" />
    <rect x="275" y="25" width="20" height="90" rx="8" fill="#2C2C2C" stroke="#EDEAE4" stroke-width="4" />
    <circle cx="285" cy="70" r="4" fill="#FF5A1F" />
  </g>
</svg>
